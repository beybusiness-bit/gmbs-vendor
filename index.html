<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GMBS 입점 브랜드 포털</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 로딩 -->
<div id="loading-screen">
  <div class="spinner"></div>
  <p style="color:var(--gray-400);font-size:14px">불러오는 중…</p>
</div>

<!-- 로그인 화면 -->
<div id="login-screen" style="display:none">
  <div class="login-card">
    <div class="login-logo">GMBS</div>
    <div class="login-sub">입점 브랜드 포털</div>

    <button class="btn btn-primary" id="btn-login">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      구글로 로그인
    </button>

    <div class="login-divider">또는</div>

    <button class="btn btn-outline" id="btn-register">
      ✨ 구글로 시작하기 (처음이신가요?)
    </button>

    <div id="login-error"></div>

    <p style="font-size:12px;color:var(--gray-400);margin-top:24px;line-height:1.6">
      로그인·가입 모두 Google 계정을 사용합니다.<br>
      처음이시면 "구글로 시작하기"를 눌러 주세요.
    </p>
  </div>
</div>

<!-- 앱 화면 -->
<div id="app-screen" style="display:none">

  <!-- 사이드바 -->
  <aside class="sidebar">
    <div class="sidebar-logo">GMBS</div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="user-avatar">?</div>
        <div>
          <div class="user-name" id="user-name-text"></div>
          <div class="user-role" id="user-role-text"></div>
        </div>
      </div>
      <button class="btn-signout" id="btn-signout">로그아웃</button>
    </div>
  </aside>

  <!-- 메인 -->
  <div class="main-wrap">
    <div class="topbar" id="topbar-title">대시보드</div>
    <div class="content" id="main-content"></div>
  </div>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
