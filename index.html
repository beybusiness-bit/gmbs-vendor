<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게을러서못열뻔한상점(GMBS) 입점 브랜드 관리자</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 로딩 -->
<div id="loading-screen">
  <div class="spinner"></div>
  <p style="color:var(--gray-400);font-size:14px">불러오는 중…</p>
</div>

<!-- 로그인/랜딩 화면 (JS가 동적으로 채움) -->
<div id="login-screen" style="display:none"></div>

<!-- 앱 화면 -->
<div id="app-screen" style="display:none">

  <!-- 사이드바 -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span class="logo-text">GMBS</span>
      <button class="sidebar-toggle" id="sidebar-toggle" title="사이드바 접기/펼치기">☰</button>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="user-avatar">?</div>
        <div class="user-info-text">
          <div class="user-name" id="user-name-text"></div>
          <div class="user-role" id="user-role-text"></div>
        </div>
      </div>
      <div class="sidebar-footer-btns">
        <button class="btn-signout" id="btn-account">계정 설정</button>
        <button class="btn-signout" id="btn-signout">로그아웃</button>
      </div>
    </div>
  </aside>

  <!-- 메인 -->
  <div class="main-wrap" id="main-wrap">
    <div class="topbar" id="topbar-title">대시보드</div>
    <div class="content" id="main-content"></div>
  </div>

</div>

<!-- EmailJS (11단계: 이메일 알림) -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
